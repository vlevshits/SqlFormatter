name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Update version numbers from tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Updating project files to version $VERSION"
            
            # Update package.json
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json'));
              pkg.version = '$VERSION';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            
            # Update tauri.conf.json
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json'));
              cfg.version = '$VERSION';
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
            "
            
            # Update Cargo.toml
            node -e "
              const fs = require('fs');
              let content = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
              content = content.replace(/^version = \".*\"/m, 'version = \"' + '$VERSION' + '\"');
              fs.writeFileSync('src-tauri/Cargo.toml', content);
            "
          else
            echo "Not a tag release, skipping version update"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: 'v__VERSION__'
          releaseName: 'SQL Formatter v__VERSION__'
          releaseBody: 'See the assets below to install SQL Formatter on your operating system.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
